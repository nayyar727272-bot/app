name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'

      - name: Unzip project
        run: |
          unzip -q remote_monitor_full.zip -d extracted_project

      - name: Find Flutter project
        run: |
          PROJECT_DIR=$(dirname "$(find extracted_project -name pubspec.yaml | head -n 1)")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Flutter project found at: $PROJECT_DIR"

      - name: Fix dependency and Android embedding
        run: |
          cd "$PROJECT_DIR"

          sed -i 's/path: \^1.9.0/path: 1.8.3/g' pubspec.yaml
          sed -i 's/package_info_plus: .*/package_info_plus: 4.2.0/g' pubspec.yaml
          sed -i 's/google_fonts: .*/google_fonts: 5.1.0/g' pubspec.yaml

          MANIFEST="android/app/src/main/AndroidManifest.xml"

          sed -i 's/android:name="io.flutter.app.FlutterApplication"/android:name="${applicationName}"/g' "$MANIFEST"

          if ! grep -q 'flutterEmbedding' "$MANIFEST"; then
            sed -i '/<\/application>/i \        <meta-data android:name="flutterEmbedding" android:value="2" />' "$MANIFEST"
          fi

      - name: Flutter pub get
        run: |
          cd "$PROJECT_DIR"
          flutter pub get

      - name: Build Debug APK
        run: |
          cd "$PROJECT_DIR"
          flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
